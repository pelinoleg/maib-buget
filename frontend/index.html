<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Buget</title>
    <meta name="description" content="Gestionarea finanțelor personale" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // iOS standalone PWA: add top padding for status bar
      if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) {
        document.body.style.paddingTop = 'env(safe-area-inset-top, 47px)';
        document.body.style.paddingTop = 'constant(safe-area-inset-top, 47px)'; // iOS < 11.2
        // Fallback if env/constant not supported
        if (getComputedStyle(document.body).paddingTop === '0px') {
          document.body.style.paddingTop = '47px';
        }
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
